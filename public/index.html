<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Escala App</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  display:flex;
  background:#f4f6f9;
}

.sidebar{
  width:220px;
  background:#1f2937;
  color:#fff;
  height:100vh;
  padding:20px;
}

.sidebar h2{ font-size:18px; }

.menu{ margin-top:20px; }

.menu div{
  padding:10px;
  cursor:pointer;
  border-radius:5px;
}

.menu div:hover{ background:#374151; }

.main{
  flex:1;
  padding:20px;
}

.topo{
  background:#fff;
  padding:10px;
  border-radius:8px;
  margin-bottom:15px;
}

.aba{ display:none; }
.ativa{ display:block; }

input, select{
  padding:8px;
  margin:5px;
  border:1px solid #ccc;
  border-radius:5px;
}

button{
  padding:8px 12px;
  border:none;
  background:#2563eb;
  color:#fff;
  border-radius:5px;
  cursor:pointer;
}

/* 🔥 NOVO (necessário pro calendário funcionar) */
#calendarioDias{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.linha{
  display:flex;
  gap:10px;
  white-space:nowrap;
}

.box{
  min-width:40px;
  text-align:center;
}
</style>

</head>

<body>

<div class="sidebar">
  <h2>Escala App</h2>

  <div class="menu">
    <div onclick="trocarAba('efetivo')">Efetivo</div>
    <div onclick="trocarAba('escala')">Escala</div>
    <div onclick="trocarAba('valores')">Valores</div>
    <div onclick="trocarAba('geral')">Geral</div>
  </div>
</div>

<div class="main">

<!-- EFETIVO -->
<div id="efetivo" class="aba ativa">

  <div class="topo">
    <h2>Cadastro de Efetivo</h2>
  </div>

  <h3>Identificação</h3>

  <input type="text" id="idFuncional" placeholder="ID FUNCIONAL">
  <input type="text" id="nome" placeholder="Nome">

  <select id="posto">
    <option value="">Selecione</option>
    <option>1º TENENTE QTBM</option>
    <option>1º SARGENTO QPBM</option>
    <option>2º SARGENTO QPBM</option>
    <option>SD QPBM – 1ª CLASSE</option>
    <option>SD QPBM – CLASSE ESPECIAL</option>
  </select>

  <h3>Dados</h3>

  <input type="text" id="cpf" placeholder="CPF">
  <input type="text" id="credor" placeholder="CREDOR">
  <input type="text" id="obm" placeholder="OBM">
  <input type="text" id="valorHE" placeholder="VALOR HE">

  <br>
  <button onclick="salvar()">Salvar</button>

  <h2>Lista</h2>
  <ul id="lista"></ul>

  <hr>

  <textarea id="areaEfetivo" rows="10" style="width:100%"></textarea>
  <button onclick="importarColagem()">Importar</button>

</div>

<!-- ESCALA -->
<div id="escala" class="aba">
  <h2>Escala</h2>
</div>

<!-- VALORES -->
<div id="valores" class="aba">
  <h2>Valores</h2>
</div>

<!-- GERAL -->
<div id="geral" class="aba">

  <div class="topo">
    <h2>GERAL</h2>
  </div>

  <label>Mês:</label>
  <select id="mesSelecionado" onchange="gerarCalendario()">
    <option value="0">Janeiro</option>
    <option value="1">Fevereiro</option>
    <option value="2">Março</option>
    <option value="3">Abril</option>
    <option value="4" selected>Maio</option>
    <option value="5">Junho</option>
    <option value="6">Julho</option>
    <option value="7">Agosto</option>
    <option value="8">Setembro</option>
    <option value="9">Outubro</option>
    <option value="10">Novembro</option>
    <option value="11">Dezembro</option>
  </select>

  <span id="nomeMes"></span>

  <!-- 🔥 CALENDÁRIO -->
  <div style="overflow-x:auto;background:#fff;padding:10px;border-radius:8px;">
    <div id="calendarioDias"></div>
  </div>

</div>

</div>

<script>
function trocarAba(id){
  document.querySelectorAll(".aba").forEach(el => el.classList.remove("ativa"));
  document.getElementById(id).classList.add("ativa");
}
</script>

<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>

<script src="app.js"></script>

</body>
</html>
